<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#05070b">
  <link rel="icon" href="assets/favicon.png" sizes="any">
  <title>TradeXVault</title>

  <style>
    body { margin:0; background:#05070b; }
    #app { min-height: 100vh; }
    .fade-enter { opacity: 0; transform: translateY(6px); }
    .fade-enter-active { opacity: 1; transform: translateY(0); transition: .18s ease; }
  </style>
</head>

<body>
  <div id="app"></div>

  <script type="module">
    import { auth } from "./js/firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const ROUTES = {
      dashboard: {
        html: "partials/dashboard.partial.html",
        css: "css/dashboard.css",
        js: "./js/dashboard.js",
      },
      trades: {
        html: "partials/trades.partial.html",
        css: "css/trades.css",
        js: "./js/trades.js",
      },
      analysis: {
        html: "partials/analysis.partial.html",
        css: "css/analysis.css",
        js: "./js/analysis.js",
      },
    };

    const app = document.getElementById("app");
    let currentCleanup = null;
    let currentCssEl = null;

    function routeName() {
      const h = (location.hash || "#dashboard").replace("#", "");
      return ROUTES[h] ? h : "dashboard";
    }

    function setPageCss(href) {
      if (currentCssEl) {
        currentCssEl.remove();
        currentCssEl = null;
      }
      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = href;
      document.head.appendChild(link);
      currentCssEl = link;
    }

    async function loadRoute(name, user) {
      // cleanup previous page listeners/subscriptions
      if (typeof currentCleanup === "function") {
        try { currentCleanup(); } catch {}
      }
      currentCleanup = null;

      const r = ROUTES[name];
      setPageCss(r.css);

      const res = await fetch(r.html, { cache: "no-store" });
      const html = await res.text();

      // transition
      app.className = "fade-enter";
      app.innerHTML = html;
      requestAnimationFrame(() => app.className = "fade-enter-active");

      // import module and init(user)
      const mod = await import(r.js + `?v=${Date.now()}`);
      if (typeof mod.init === "function") {
        currentCleanup = await mod.init(user);
      }
    }

    // Auth guard + first load
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }
      loadRoute(routeName(), user);
    });

    // Hash routing
    window.addEventListener("hashchange", () => {
      const user = auth.currentUser;
      if (user) loadRoute(routeName(), user);
    });
  </script>
</body>
</html>
